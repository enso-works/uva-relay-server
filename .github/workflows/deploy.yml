name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test -race ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 100.79.155.92 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no deploy@100.79.155.92 << 'EOF'
            sudo /usr/bin/docker pull ghcr.io/enso-works/uva-relay-server:latest
            sudo /usr/bin/docker stop uvame-relay || true
            sudo /usr/bin/docker rm uvame-relay || true
            sudo /usr/bin/docker run -d \
              --name uvame-relay \
              --restart unless-stopped \
              --network bavrk_default \
              -e RELAY_PORT=4400 \
              -e RELAY_DATA_DIR=/data \
              -e RELAY_LOG_LEVEL=info \
              -v uvame_relay_data:/data \
              ghcr.io/enso-works/uva-relay-server:latest
            sudo /usr/bin/docker image prune -f
          EOF
