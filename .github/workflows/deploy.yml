name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test -race ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 89.167.2.212
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo /usr/bin/docker pull ghcr.io/enso-works/uva-relay-server:latest
            cd ~/uvame
            sudo /usr/bin/docker stop uvame-relay || true
            sudo /usr/bin/docker rm uvame-relay || true
            sudo /usr/bin/docker run -d \
              --name uvame-relay \
              --restart unless-stopped \
              --network bavrk_default \
              -e RELAY_PORT=4400 \
              -e RELAY_DATA_DIR=/data \
              -e RELAY_LOG_LEVEL=info \
              -v uvame_relay_data:/data \
              ghcr.io/enso-works/uva-relay-server:latest
            sudo /usr/bin/docker image prune -f
